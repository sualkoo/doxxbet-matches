<mat-toolbar>
  <div class="toolbar-center">
    <span class="toolbar-brand">DOXX</span><span class="toolbar-brand__accent">bet</span>
  </div>

  <div class="toolbar-right">
    <span class="highlight-function-label">Highlighted odd</span>

    <div class="highlight-control">
      <button
        mat-icon-button
        (click)="cyclePrevOdd.emit()"
        aria-label="Previous highlighted odd"
        [disabled]="highlightedOdd() === null"
      >
        <mat-icon>chevron_left</mat-icon>
      </button>
      <span class="highlight-label">{{ highlightedOdd() | formatOdd }}</span>
      <button mat-icon-button (click)="cycleNextOdd.emit()" aria-label="Next highlighted odd">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>

    <button
      mat-stroked-button
      type="button"
      (click)="allLeaguesCollapsed.set(!allLeaguesCollapsed())"
      [attr.aria-label]="allLeaguesCollapsed() ? 'Expand all leagues' : 'Collapse all leagues'"
    >
      {{ allLeaguesCollapsed() ? 'Expand all' : 'Collapse all' }}
    </button>
  </div>
</mat-toolbar>
