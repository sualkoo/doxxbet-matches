<footer class="site-footer" aria-label="Site footer">
  <div class="site-footer__inner">
    <div class="site-footer__brand-block">
      <p class="site-footer__eyebrow">Match center</p>
      <a class="site-footer__brand" routerLink="/" aria-label="Go to sport selection">
        DOXX<span class="site-footer__brand-accent">bet</span>
      </a>
      <p class="site-footer__summary">
        Browse live offers in a focused dark interface with grouped leagues and highlighted odds.
      </p>
    </div>

    <nav class="site-footer__links" aria-label="Footer links">
      <a [href]="dataFeedUrl" target="_blank" rel="noreferrer">Data feed</a>
    </nav>
  </div>
</footer>
