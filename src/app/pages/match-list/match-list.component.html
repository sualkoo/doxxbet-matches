<app-matches-toolbar
  [sortedOddValues]="visibleSortedUniqueOddValues()"
  [highlightLevel]="highlightLevel()"
  [highlightedOdd]="highlightedOdd()"
  (highlightedOddChange)="highlightedOdd.set($event)"
  [allLeaguesCollapsed]="allLeaguesCollapsed()"
  (allLeaguesCollapsedChange)="toggleAllVisibleLeagues()"
  (cycleNextOdd)="cycleHighlightNext()"
  (cyclePrevOdd)="cycleHighlightPrev()"
/>

@if (status() === 'loading') {
  <mat-progress-bar mode="indeterminate" />
}

@if (status() === 'error') {
  <div class="error-message">
    <p>Failed to load matches. Please try again.</p>
    <button mat-raised-button color="primary" (click)="retry()">Retry</button>
  </div>
}

@if (status() === 'success') {
  @if (allGroups().length === 0) {
    <mat-card class="empty-state">
      <mat-card-content>
        <p>No matches available.</p>
        <button mat-raised-button color="primary" (click)="retry()">Retry</button>
      </mat-card-content>
    </mat-card>
  } @else {
    <app-matches-sidenav
      [selectedLeagueId]="selectedLeagueId()"
      (leagueSelected)="selectLeague($event)"
    >
      @for (league of visibleLeagues(); track league.leagueId) {
        <app-league-section
          [league]="league"
          [highlightedOdd]="highlightedOdd()"
          [collapsed]="collapsedLeagues().has(league.leagueId)"
          (toggled)="toggleLeague($event)"
        />
      }
      <div class="league-list-bottom-spacer" aria-hidden="true"></div>
    </app-matches-sidenav>
  }
}
