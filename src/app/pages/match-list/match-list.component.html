<app-matches-toolbar
  [sportName]="sportName()"
  [highlightedOdd]="highlightedOdd()"
  (back)="goBack()"
  (cycleHighlight)="cycleHighlightNext()"
  (cyclePrev)="cycleHighlightPrev()"
/>

@if (status() === 'loading') {
  <mat-progress-bar mode="indeterminate" />
}

@if (status() === 'error') {
  <div class="error-message">
    <p>Failed to load matches. Please try again.</p>
    <button mat-raised-button color="primary" (click)="retry()">Retry</button>
  </div>
}

@if (status() === 'success') {
  @if (groups().length === 0) {
    <mat-card class="empty-state">
      <mat-card-content>
        <p>No matches available.</p>
        <button mat-raised-button color="primary" (click)="retry()">Retry</button>
      </mat-card-content>
    </mat-card>
  } @else {
    <app-matches-sidenav
      [selectedRegionId]="selectedRegionId()"
      [visibleLeagues]="visibleLeagues()"
      [highlightedOdd]="highlightedOdd()"
      (countrySelected)="selectedRegionId.set($event)"
    />
  }
}
