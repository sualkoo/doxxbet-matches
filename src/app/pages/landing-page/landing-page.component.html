<main class="landing" aria-labelledby="landing-title">
  <div class="landing__backdrop" aria-hidden="true"></div>
  <div class="landing__icons" aria-hidden="true">
    @for (item of floatingSportIcons; track item.modifier) {
      <mat-icon [class]="'landing__icon landing__icon--' + item.modifier">{{ item.icon }}</mat-icon>
    }
  </div>

  <section class="landing__content">
    <p class="landing__eyebrow">Match center</p>

    <h1 id="landing-title" class="landing__brand" aria-label="DOXXbet">
      DOXX<span class="landing__brand-accent">bet</span>
    </h1>

    <p class="landing__copy">
      Explore today&apos;s fixtures, grouped leagues, and highlighted odds in one focused dashboard.
    </p>

    <a class="landing__cta" routerLink="/matches" aria-label="Open matches page">Matches</a>
  </section>
</main>
